<div class="page">
  <div class="page-title"><h1>Profile</h1></div>
  @if (user) {
    <section class="panel profile">
      <span>{{ user.name.charAt(0) }}</span>
      <div>
        <strong>{{ user.name }}</strong>
        <p class="muted">{{ user.email }} · {{ user.role }}</p>
      </div>
    </section>
  }
  <section>
    <div class="section-title"><h2>Playback history</h2></div>
    <app-track-list [tracks]="historyTracks" (play)="play($event)"></app-track-list>
  </section>
</div>
