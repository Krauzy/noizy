<div class="page">
  <div class="page-title">
    <h1>Settings</h1>
  </div>

  @if (user$ | async; as user) {
    <section class="settings-grid">
      <article class="panel account-panel">
        <label class="avatar-control" title="Change profile photo">
          <input type="file" accept="image/*" (change)="avatarSelected($event)">
          @if (avatarPreviewUrl) {
            <img [src]="avatarPreviewUrl" alt="Profile photo preview">
          } @else if (avatarUrl(user); as avatar) {
            <img [src]="avatar" [alt]="user.name + ' profile photo'">
          } @else {
            <span class="avatar">{{ user.name.charAt(0) }}</span>
          }
          <strong>{{ avatarUploading ? 'Uploading' : 'Change photo' }}</strong>
        </label>
        <div>
          <small>Account</small>
          <strong>{{ user.name }}</strong>
          <p class="muted">{{ user.email }}</p>
        </div>
      </article>

      <article class="panel">
        <small>Plan</small>
        <strong>{{ roleLabel(user.role) }}</strong>
        <p class="muted">
          @if (canUpload(user.role)) {
            Upload tools are enabled for this account.
          } @else {
            Upload tools are available for artist accounts.
          }
        </p>
      </article>

      <article class="panel preferences">
        <small>Playback</small>
        <label class="check-option">
          <input type="checkbox" checked>
          <span aria-hidden="true"></span>
          Start tracks from the expanded player
        </label>
        <label class="check-option">
          <input type="checkbox">
          <span aria-hidden="true"></span>
          Normalize volume between tracks
        </label>
      </article>
    </section>
  }
</div>
