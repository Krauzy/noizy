<div class="page">
  <div class="page-title"><h1>Upload Track</h1></div>
  <section class="panel upload-panel">
    <form class="form upload-form" [formGroup]="form" (ngSubmit)="submit()">
      <p class="muted">Uploads are published under the artist account currently logged in.</p>
      <label>Title<input type="text" formControlName="title"></label>
      <label class="select-field">Album
        <select class="select-control" formControlName="albumId">
          <option value="">No album</option>
          @for (album of albums; track album.id) {
            <option [value]="album.id">{{ album.title }}</option>
          }
        </select>
      </label>
      <label>Genre<input type="text" formControlName="genre"></label>
      <label class="file-control">
        <span>Audio file</span>
        <input type="file" accept="audio/*" (change)="fileSelected($event, 'audio')">
        <strong>{{ audioFile?.name || 'Choose audio' }}</strong>
      </label>
      <label class="file-control">
        <span>Cover image</span>
        <input type="file" accept="image/*" (change)="fileSelected($event, 'cover')">
        <strong>{{ coverFile?.name || 'Choose cover' }}</strong>
      </label>
      @if (error) { <p class="error">{{ error }}</p> }
      @if (message) { <p class="success">{{ message }}</p> }
      <button class="button" type="submit">Upload</button>
    </form>
  </section>
</div>
