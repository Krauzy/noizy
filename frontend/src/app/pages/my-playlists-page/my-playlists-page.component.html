<div class="page">
  <div class="page-title"><h1>My Playlists</h1></div>
  <section class="panel">
    <form class="form" [formGroup]="form" (ngSubmit)="create()">
      <label>Name<input type="text" formControlName="name"></label>
      <label>Description<textarea rows="3" formControlName="description"></textarea></label>
      <label class="check"><input type="checkbox" formControlName="isPublic"> Public playlist</label>
      <button class="button" type="submit">Create playlist</button>
    </form>
  </section>

  @if (playlists.length) {
    <div class="grid">
      @for (playlist of playlists; track playlist.id) {
        <app-playlist-card [playlist]="playlist"></app-playlist-card>
      }
    </div>
  } @else {
    <app-empty-state title="No playlists" description="Create your first playlist above."></app-empty-state>
  }
</div>
