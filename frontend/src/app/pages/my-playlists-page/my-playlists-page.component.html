<div class="page">
  <div class="page-title"><h1>My Playlists</h1></div>

  @if (playlists.length) {
    <div class="grid">
      @for (playlist of playlists; track playlist.id) {
        <app-playlist-card [playlist]="playlist"></app-playlist-card>
      }
    </div>
  } @else {
    <app-empty-state title="No playlists" description="Saved playlists will appear here."></app-empty-state>
  }
</div>
