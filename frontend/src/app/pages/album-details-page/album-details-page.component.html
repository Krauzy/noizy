<div class="page">
  @if (album) {
    <section class="album-hero">
      <span>●</span>
      <div>
        <p>Album</p>
        <h1>{{ album.title }}</h1>
        <small>{{ album.artist.name }} · {{ album.releaseDate || 'Release date unavailable' }}</small>
      </div>
    </section>
  }
  <app-track-list [tracks]="tracks" (play)="play($event)" (like)="like($event)"></app-track-list>
</div>
