<article class="music-card">
  <button type="button" class="cover" (click)="play.emit(track)" [attr.aria-label]="'Play ' + track.title">
    @if (coverUrl(track); as cover) {
      <img [src]="cover" [alt]="track.title + ' cover'">
    }
    <span class="play-badge">
      <fa-icon [icon]="icons.play" aria-hidden="true"></fa-icon>
    </span>
  </button>
  <h3><a [routerLink]="['/tracks', track.id]">{{ track.title }}</a></h3>
  <p><a [routerLink]="['/artists', track.artist.id]">{{ track.artist.name }}</a></p>
  <footer>
    <small>{{ track.genre || 'Track' }} - {{ track.playCount }} plays</small>
    <span class="actions">
      <button
        type="button"
        class="options"
        title="Add to playlist"
        (click)="openOptions()"
        [attr.aria-label]="'Options for ' + track.title">
        <fa-icon [icon]="icons.options" aria-hidden="true"></fa-icon>
      </button>
      <button
        type="button"
        class="like"
        [class.active]="track.liked"
        (click)="like.emit(track)"
        [attr.aria-label]="(track.liked ? 'Unlike ' : 'Like ') + track.title">
      <fa-icon [icon]="icons.like" aria-hidden="true"></fa-icon>
      </button>
    </span>
  </footer>
</article>
