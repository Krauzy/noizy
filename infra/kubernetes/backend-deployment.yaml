apiVersion: apps/v1
kind: Deployment
metadata:
  name: noizy-backend
  namespace: noizy
  labels:
    app: noizy-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: noizy-backend
  template:
    metadata:
      labels:
        app: noizy-backend
    spec:
      serviceAccountName: noizy-backend
      containers:
        - name: backend
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/noizy-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: noizy-config
            - secretRef:
                name: noizy-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
