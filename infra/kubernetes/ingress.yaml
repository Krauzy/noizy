apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: noizy
  namespace: noizy
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
spec:
  rules:
    - host: noizy.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: noizy-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: noizy-frontend
                port:
                  number: 80
