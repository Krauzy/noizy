apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: noizy-backend
  namespace: noizy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: noizy-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
