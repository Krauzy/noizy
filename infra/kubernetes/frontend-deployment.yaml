apiVersion: apps/v1
kind: Deployment
metadata:
  name: noizy-frontend
  namespace: noizy
  labels:
    app: noizy-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: noizy-frontend
  template:
    metadata:
      labels:
        app: noizy-frontend
    spec:
      containers:
        - name: frontend
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/noizy-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
